<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mushroom Cloud Standalone Bundle Test</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.21.0/dist/lil-gui.esm.js"
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
      body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #ddd; }
      canvas { display: block; }
      .hud {
        position: fixed; left: 24px; bottom: 22px; z-index: 10;
        color: rgba(255,255,255,.68); font-size: 12px; letter-spacing: .08em;
        text-transform: uppercase; pointer-events: none; text-shadow: 0 1px 8px #000;
      }
      .hud strong { color: rgba(255,255,255,.9); font-weight: 600; }
      .flash {
        position: fixed; inset: 0; z-index: 8; pointer-events: none;
        background: white; opacity: 0; mix-blend-mode: screen;
      }
      .lil-gui.root { --background-color: rgba(10,10,10,.82); --widget-color: #202020; --hover-color: #292929; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="flash" class="flash"></div>
    <div class="hud"><strong>Space</strong> launch · <strong>R</strong> reset · <strong>P</strong> pause · drag orbit · scroll zoom</div>
    <script type="module" src="./standalone_bundled.js"></script>
  </body>
</html>

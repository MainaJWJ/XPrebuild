<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Flight Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-layer">
        <main id="world"></main>
        
        <!-- 콕핏 아날로그 계기판 대시보드 (1인칭 시점 s3에서만 노출) -->
        <div id="cockpit-dashboard" style="display: none;">
            <canvas id="gauge-speed" class="gauge-canvas" width="300" height="300"></canvas>
            <canvas id="gauge-attitude" class="gauge-canvas" width="300" height="300"></canvas>
            <canvas id="gauge-altitude" class="gauge-canvas" width="300" height="300"></canvas>
        </div>
        
        <!-- 로비 화면 오버레이 -->
        <div id="lobby-screen">
            <div class="lobby-content">
                <h1 class="lobby-title">FLIGHT SIMULATOR</h1>
                <div class="lobby-briefing">
                    <h3>MISSION BRIEFING</h3>
                    <p><strong>기체:</strong> <span id="lobby-aircraft-name">F/A-18 Hornet (Hornet 1-1)</span></p>
                    <p><strong>임무:</strong> 아군 Nimitz 항공모함을 위협하는 적 항공 세력을 무력화하십시오.</p>
                    <div id="lobby-keys-container" style="margin-top: 15px;"></div>
                </div>

                <!-- 기체 선택 콘트롤 UI -->
                <div style="margin-top: 20px; margin-bottom: 25px; text-align: center;">
                    <h3 style="color: #ffd000; font-family: 'Courier New', monospace; font-size: 15px; letter-spacing: 1px; margin: 0 0 10px 0;">SELECT AIRCRAFT</h3>
                    <div id="lobby-aircraft-container" style="display: flex; justify-content: center; gap: 12px;">
                        <button class="aircraft-select-btn active" data-ship="F-18">F/A-18 Hornet</button>
                        <button class="aircraft-select-btn" data-ship="biplane">Biplane</button>
                        <button class="aircraft-select-btn" data-ship="b52">B-52 Stratofortress</button>
                        <button class="aircraft-select-btn" data-ship="helicopter">Helicopter</button>
                    </div>
                </div>
                
                <!-- 날씨 선택 콘트롤 UI -->
                <div style="margin-top: 20px; margin-bottom: 25px; text-align: center;">
                    <h3 style="color: #ffd000; font-family: 'Courier New', monospace; font-size: 15px; letter-spacing: 1px; margin: 0 0 10px 0;">ENVIRONMENT WEATHER SELECT</h3>
                    <div id="lobby-weather-container" style="display: flex; justify-content: center; gap: 8px;"></div>
                </div>

                <button id="btn-start-simulation" class="lobby-button">START MISSION</button>
            </div>
        </div>
    </div>

    <!-- Action Cam Overlay -->
    <div id="action-cam-overlay" style="position: absolute; top: 20px; right: 20px; width: 320px; height: 240px; border: 2px solid #00ff88; box-sizing: border-box; display: none; pointer-events: none; z-index: 10;">
        <div style="background: rgba(0,255,136,0.5); color: #fff; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 14px; padding: 4px; text-shadow: 1px 1px 2px #000;">[ TARGET CAM ]</div>
    </div>

    <!-- Left Mirror Overlay (Rearview Mirror) -->
    <div id="left-mirror-overlay" style="position: absolute; top: 100px; left: 60px; width: 130px; height: 82px; border: 3px solid #2d384e; border-radius: 8px 8px 12px 12px; box-sizing: border-box; display: none; pointer-events: none; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.6), inset 0 0 8px rgba(0, 255, 136, 0.2); text-align: center;">
        <div style="background: rgba(45,56,78,0.6); color: #00ff88; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 8px; padding: 2px 6px; text-shadow: 1px 1px 2px #000; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; display: inline-block;">REAR VIEW</div>
    </div>
    <!-- Include Three.js and required loaders -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Include our custom modules -->
    <script>
        // 에뮬레이터 iframe 내부에 탑재된 경우에만 포커스 제어 스크립트 동적 로드
        if (window.parent !== window) {
            const script = document.createElement('script');
            script.src = '../../focusController.js';
            script.onerror = () => console.log('[FocusController] Standalone mode or outer directory unreachable. Skipping focus script.');
            document.head.appendChild(script);
        }
    </script>
    <script src="soundManager.js?v=2"></script>
    <script src="collisionSystem.js?v=2"></script>
    <script src="myShipControl.js?v=2"></script>
    <script src="advancedControl.js?v=2"></script>
    <script src="helicopterControl.js?v=1"></script>
    <script src="uiManager.js?v=2"></script>
    <script src="landingSystem.js?v=2"></script>
    <script src="weaponSystem.js?v=2"></script>
    <script src="particleSystem.js?v=2"></script>
    <script src="environment.js?v=2"></script>
    <script src="enemySystem.js?v=2"></script>
    <script src="oceanSystem.js?v=3"></script>
    <script src="weatherSystem.js?v=1"></script>
    <script src="shipEffects.js?v=2"></script>
    <script src="gunSystem.js?v=2"></script>
    <script src="mushroomCloudVFX.js?v=7"></script>


    <script type="module">
        // --- 1. 기본 구성 요소 생성 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec2f6); // 눈부신 대낮 하늘색 (Bright Summer Sky Blue)
        // 카메라의 near(가까운 절두체) 값을 키우면 먼 거리의 뎁스 정밀도가 크게 향상됩니다.
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 10, 1000000);
        window.mainCamera = camera;
        
        // --- Action Cam 설정 ---
        window.actionCamera = new THREE.PerspectiveCamera(60, 320 / 240, 10, 100000);
        window.actionCamTarget = null;
        window.actionCamTimer = 0;

        // --- Side Mirror Cameras 설정 ---
        window.leftMirrorCamera = new THREE.PerspectiveCamera(50, 130 / 82, 10, 200000);
        window.triggerActionCam = function(target, duration = 4.0) {
            if (!target) return;
            window.actionCamTarget = target;
            window.actionCamTimer = duration;
        };
        
        // 거대한 맵에서의 그리드 깨짐(Z-fighting) 현상을 막기 위해 logarithmicDepthBuffer 옵션을 켭니다.
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true, 
            logarithmicDepthBuffer: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x7ec2f6, 1); // 렌더러 배경도 눈부신 대낮 하늘색으로 맞춤
        renderer.shadowMap.enabled = true; // 그림자 활성화
        renderer.autoClear = false;
        document.getElementById('world').appendChild(renderer.domElement);

        // --- 2. 조명 및 바닥 추가 ---
        const ambientLight = new THREE.AmbientLight(0xdbebff, 1.2); // 대낮 하늘빛 산란광 강도 대폭 강화 (0.8 -> 1.2)
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfffaed, 1.8); // 대낮 햇빛 강도 대폭 강화 (1.3 -> 1.8)
        dirLight.position.set(1000, 2000, 1000);
        dirLight.castShadow = true;
        // 그림자 범위 설정
        dirLight.shadow.camera.left = -5000;
        dirLight.shadow.camera.right = 5000;
        dirLight.shadow.camera.top = 5000;
        dirLight.shadow.camera.bottom = -5000;
        scene.add(dirLight);

        // 바닥 평면 → OceanSystem이 대체합니다 (oceanSystem.js 참고)

        // --- 3. 초기화 및 제어 설정 ---
        const clock = new THREE.Clock();
        window.cameraMode = 's1';
        const CAM_MODES = ['s1', 's2', 's3'];
        let camModeIndex = 0;

        document.addEventListener('keydown', (event) => {
            if (event.key === 'd' || event.key === 'D') {
                camModeIndex = (camModeIndex + 1) % CAM_MODES.length;
                window.cameraMode = CAM_MODES[camModeIndex];
            }
            // F1~F5: 날씨 프리셋 전환 (WeatherSystem)
            const weatherKeys = { 'F1': 'day', 'F2': 'sunset', 'F3': 'cloudy', 'F4': 'night', 'F5': 'storm' };
            if (weatherKeys[event.key] && window.WeatherSystem) {
                event.preventDefault();
                window.WeatherSystem.setWeather(weatherKeys[event.key], 5.0);
            }
        });

        window.isLobbyActive = true;

        async function init() {
            // 사운드 시스템 초기화 및 사전 로딩
            if (window.soundManager) {
                window.soundManager.init(camera);
                await window.soundManager.loadAllSounds();
            }

            // UI 관리자 초기화 (scene, renderer 전달)
            if (window.initUIManager) window.initUIManager(scene, renderer);

            // 우주선 컨트롤러 초기화
            await initMyShipControl(scene, camera);
            console.log("Spaceship controller initialized.");

            if (window.spawnSpaceship) window.spawnSpaceship();

            // 초기 로비 진입 시 기체는 일시정지(frozen) 상태로 시작
            if (typeof spaceship !== 'undefined') {
                spaceship.frozen = true;
            }

            // 파티클 시스템 초기화
            if (window.ParticleManager) {
                window.ParticleManager.init(scene);
            }

            // 무기 시스템 초기화
            if (window.WeaponManager) {
                await window.WeaponManager.init(scene, spaceship);
            }

            // 기관포 시스템 초기화
            if (window.GunManager) {
                window.GunManager.init(scene, spaceship);
            }

            // 환경 오브젝트 초기화 (environment.js에서 관리)
            if (window.EnvironmentManager) {
                window.EnvironmentManager.init(scene);
            }

            // 적 시스템 초기화
            if (window.EnemySystem) {
                await window.EnemySystem.init(scene, spaceship);
            }

            // 바다 환경 초기화 (oceanSystem.js에서 관리)
            if (window.OceanSystem) {
                window.OceanSystem.init(scene, renderer);
            }

            // 날씨 시스템 초기화 (weatherSystem.js에서 관리)
            if (window.WeatherSystem) {
                window.WeatherSystem.init(scene, renderer, ambientLight, dirLight);
            }

            // 버섯구름 매니저 초기화
            if (window.MushroomExplosionManager) {
                window.MushroomExplosionManager.init(scene, camera);
            }

            // 로비 버튼 이벤트 리스너 바인딩
            const startBtn = document.getElementById('btn-start-simulation');
            if (startBtn) {
                startBtn.addEventListener('click', () => {
                    window.isLobbyActive = false;
                    if (typeof spaceship !== 'undefined') {
                        spaceship.frozen = false;
                    }

                    // 오디오 플레이 시작 (사용자 동작 이후이므로 정상 재생 가능)
                    if (window.soundManager) {
                        window.soundManager.play('jet-engine');
                        window.soundManager.play('wind');
                        window.soundManager.play('spawn');
                    }

                    // 페이드 아웃 및 제거
                    const lobbyScreen = document.getElementById('lobby-screen');
                    if (lobbyScreen) {
                        lobbyScreen.style.opacity = '0';
                        setTimeout(() => {
                            lobbyScreen.style.display = 'none';
                        }, 500);
                    }
                });
            }

            // 기체 선택 버튼 이벤트 리스너 바인딩
            const aircraftContainer = document.getElementById('lobby-aircraft-container');
            if (aircraftContainer) {
                const buttons = aircraftContainer.querySelectorAll('.aircraft-select-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const ship = btn.getAttribute('data-ship');
                        if (window.selectedShip === ship) return;

                        // 기존 버튼 active 비활성화 및 선택 버튼 active 활성화
                        buttons.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');

                        // 로비 설명 텍스트 업데이트
                        const aircraftNameSpan = document.getElementById('lobby-aircraft-name');
                        if (aircraftNameSpan) {
                            if (ship === 'F-18') {
                                aircraftNameSpan.innerText = 'F/A-18 Hornet (Hornet 1-1)';
                            } else if (ship === 'biplane') {
                                aircraftNameSpan.innerText = 'Biplane (Sopwith Camel 1-1)';
                            } else if (ship === 'b52') {
                                aircraftNameSpan.innerText = 'B-52 Stratofortress (Stratofortress 1-1)';
                            } else if (ship === 'helicopter') {
                                aircraftNameSpan.innerText = 'Helicopter (UH-60 1-1)';
                            }
                        }

                        // 기체 로딩 중 시작 버튼 비활성화 및 로딩 텍스트 표시
                        if (startBtn) {
                            startBtn.disabled = true;
                            startBtn.innerText = 'LOADING MODEL...';
                        }

                        // 기체 교체
                        if (window.changeShip) {
                            await window.changeShip(ship);
                        }

                        // 로딩 완료 후 시작 버튼 활성화
                        if (startBtn) {
                            startBtn.disabled = false;
                            startBtn.innerText = 'START MISSION';
                        }
                    });
                });
            }

            function animate() {
                requestAnimationFrame(animate);
                let delta = clock.getDelta();
                if (delta > 0.1) delta = 0.1; // 일시정지 해제 혹은 프레임 밀림 시 대규모 물리 수치 폭주 방지


                // FPS 갱신 (uiManager.js에서 관리)
                if (window.updateFPS) window.updateFPS();

                // 플레이어가 직접 일시정지 버튼을 눌렀거나 로비 활성 상태인지 판정
                const isPaused = (typeof spaceship !== 'undefined' && spaceship.frozen && !spaceship.destroyed) || window.isLobbyActive;

                if (!isPaused) {
                    // 시뮬레이션 업데이트
                    if (window.EnvironmentManager && window.EnvironmentManager.update) window.EnvironmentManager.update(delta);
                    if (window.OceanSystem) window.OceanSystem.update(delta, camera);
                    if (window.WeatherSystem) window.WeatherSystem.update(delta, camera);
                    if (window.ParticleManager) window.ParticleManager.update(delta);
                    if (window.updateSpaceship) window.updateSpaceship(delta, camera, window.cameraMode);
                    if (window.ShipEffectsManager) window.ShipEffectsManager.update(delta, spaceship);
                    if (window.updateSpaceshipAnimation) window.updateSpaceshipAnimation(delta);
                    if (window.WeaponManager) window.WeaponManager.update(delta);
                    if (window.GunManager) window.GunManager.update(delta);
                    if (window.EnemySystem) window.EnemySystem.update(delta);
                    if (window.MushroomExplosionManager) window.MushroomExplosionManager.update(delta);
                } else {
                    // 일시정지 중이거나 로비 상태이더라도 궤적선은 계속 업데이트/렌더링되도록 함
                    if (window.WeaponManager && window.WeaponManager.updatePredictionLine) {
                        window.WeaponManager.updatePredictionLine();
                    }
                }

                // HUD 렌더
                if (window.updateHUD && typeof spaceship !== 'undefined') {
                    window.updateHUD(spaceship, camera, delta);
                }

                // 메인 렌더링
                renderer.clear();
                renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
                renderer.setScissorTest(false);
                renderer.render(scene, camera);

                // Action Cam (PiP) 렌더링
                const overlay = document.getElementById('action-cam-overlay');
                if (window.actionCamTimer > 0 && window.actionCamTarget) {
                    window.actionCamTimer -= delta;

                    const targetPos = new THREE.Vector3();
                    window.actionCamTarget.getWorldPosition(targetPos);
                    
                    // 약간 뒤쪽 위에서 대각선 아래로 내려다보는 각도 (3인칭 백뷰)
                    const offset = new THREE.Vector3(-150, 80, 0);
                    if (window.actionCamTarget.quaternion) {
                        offset.applyQuaternion(window.actionCamTarget.quaternion);
                    }
                    window.actionCamera.position.copy(targetPos).add(offset);
                    window.actionCamera.lookAt(targetPos);

                    const pipW = 320;
                    const pipH = 240;
                    const pipX = window.innerWidth - pipW - 20; // 우측 여백 20px
                    const webglPipY = window.innerHeight - pipH - 20; // 화면 위쪽에서 20px 떨어짐

                    renderer.setScissorTest(true);
                    renderer.setScissor(pipX, webglPipY, pipW, pipH);
                    renderer.setViewport(pipX, webglPipY, pipW, pipH);
                    
                    // 깊이 버퍼만 지워서 메인 렌더링 위에 덮어씀
                    renderer.clearDepth();
                    renderer.render(scene, window.actionCamera);
                    renderer.setScissorTest(false);
                    
                    if (overlay) overlay.style.display = 'block';
                } else {
                    if (overlay) overlay.style.display = 'none';
                }

                // Rearview Mirror Camera update & render
                const leftMirrorEl = document.getElementById('left-mirror-overlay');
                
                if (typeof spaceship !== 'undefined' && spaceship.mesh && !window.isLobbyActive) {
                    if (leftMirrorEl) leftMirrorEl.style.display = 'block';

                    // 콕핏 뷰(s3) 등으로 인해 기체가 숨겨진 상태이더라도 백미러 상에는 기체 후방(꼬리 날개 등)이 항상 동일하게 보이도록 가시성 임시 활성화
                    const originalVisibleState = spaceship.mesh.visible;
                    spaceship.mesh.visible = true;

                    const shipPos = spaceship.mesh.position;
                    const shipQuat = spaceship.mesh.quaternion;

                    // Rearview Mirror Camera Position & LookAt (loaded from JSON config with fallback)
                    const mirrorConfig = (spaceship.config && spaceship.config.rearviewMirror) ? spaceship.config.rearviewMirror : {};
                    const offsetVal = mirrorConfig.offset || { x: -12, y: 5, z: 0 };
                    const lookVal = mirrorConfig.lookTarget || { x: -120, y: 2, z: 0 };

                    const leftOffset = new THREE.Vector3(offsetVal.x, offsetVal.y, offsetVal.z).applyQuaternion(shipQuat);
                    window.leftMirrorCamera.position.copy(shipPos).add(leftOffset);
                    
                    const leftLookTarget = new THREE.Vector3(lookVal.x, lookVal.y, lookVal.z).applyQuaternion(shipQuat);
                    const leftLookPos = shipPos.clone().add(leftLookTarget);
                    window.leftMirrorCamera.up.set(0, 1, 0).applyQuaternion(shipQuat);
                    window.leftMirrorCamera.lookAt(leftLookPos);

                    // Render Rearview Mirror at Top Center
                    const mirrorW = 130;
                    const mirrorH = 82;
                    
                    renderer.setScissorTest(true);
                    
                    const leftWebGLX = 60;
                    const leftWebGLY = window.innerHeight - mirrorH - 100;
                    renderer.setScissor(leftWebGLX, leftWebGLY, mirrorW, mirrorH);
                    renderer.setViewport(leftWebGLX, leftWebGLY, mirrorW, mirrorH);
                    renderer.clearDepth();
                    renderer.render(scene, window.leftMirrorCamera);
                    
                    renderer.setScissorTest(false);

                    // 기체 가시성 원복
                    spaceship.mesh.visible = originalVisibleState;
                } else {
                    if (leftMirrorEl) leftMirrorEl.style.display = 'none';
                }

                // Gizmo 렌더링 (uiManager.js에서 관리)
                if (window.renderGizmo) {
                    window.renderGizmo(camera, typeof spaceship !== 'undefined' && !spaceship.frozen);
                }
            }
            animate();
        }

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date and Time Properties</title>
    <style>
        :root {
            --window-bg: #ECE9D8;
            --window-fg: #000000;
            --button-bg: linear-gradient(180deg, #ffffff 0%, #F0F0EA 100%);
            --button-fg: var(--window-fg);
            --input-bg: #FFFFFF;
            --input-fg: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Tahoma", "Segoe UI", sans-serif;
            background-color: var(--window-bg);
            color: var(--window-fg);
            user-select: none;
            overflow: hidden;
        }

        .timedateprops {
            width: 415px;
            height: 350px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Content Container */
        .content-container {
            border: 1px solid #ACA899;
            background: #FFF;
            padding: 12px;
            height: 230px;
            font-size: 11px;
            box-shadow: inset 1px 1px 0 #FFF;
        }

        .tab-content {
            display: none;
        }

        .tab-content.selected {
            display: block;
        }

        /* Controls Group */
        .controls-group {
            padding: 10px;
            border: 1px solid #ACA899;
            background: #FFF;
            min-height: 180px;
        }

        .section-title {
            margin-top: 0;
            margin-bottom: 3px;
            font-size: 11px;
        }

        /* Calendar */
        .calendar {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 5px;
        }

        .calendar th {
            color: #000080;
            font-weight: normal;
            padding-bottom: 5px;
        }

        .calendar td {
            text-align: center;
            padding: 3px;
            cursor: default;
            width: 14.28%;
        }

        .calendar td:hover:not(.other-month) {
            outline: 1px solid #000080;
        }

        .calendar td.selected {
            background-color: #000080;
            color: white;
        }

        .calendar td.other-month {
            color: #ACA899;
        }

        /* Clock Section */
        #analog-clock {
            margin-bottom: 10px;
        }

        .digital-time-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #digital-time-input {
            width: 80px;
            text-align: center;
            height: 19px;
            font-size: 12px;
            border: 1px solid #7F9DB9;
            background-color: #FFF;
        }

        /* Spinner Buttons */
        .spinner-buttons {
            display: flex;
            flex-direction: column;
            margin-left: 1px;
            gap: 1px;
        }

        .spinner-btn {
            font-family: "Tahoma", sans-serif !important;
            font-size: 7px !important;
            line-height: 7px !important;
            width: 15px !important;
            height: 9px !important;
            min-width: 15px !important; /* Override global button min-width */
            padding: 0 !important;
            margin: 0 !important;
            border: 1px solid #7F9DB9 !important;
            background: #ECE9D8 !important; /* XP-like button background */
            box-shadow: inset -1px -1px #fff, inset 1px 1px #808080 !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            border-radius: 0 !important;
        }

        .spinner-btn::after {
            display: none !important; /* Hide the orange/blue border from global button style */
        }

        .spinner-btn:active {
            box-shadow: inset 1px 1px #fff, inset -1px -1px #808080 !important;
            padding-top: 1px !important;
        }

        /* Bottom Buttons */
        .btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 15px;
        }

        /* Button Styles from properties.css */
        button,
        .win-btn {
            background: linear-gradient(180deg, #ffffff 0%, #F0F0EA 100%);
            color: #000;
            border: 1px solid #003C74;
            border-radius: 4px;
            padding: 2px 16px 3px;
            box-shadow: -1px -1px 0 #E2DED4, 1px 1px 0 #FBFAF8, inset -1px -2px 1px #D6D0C5;
            text-align: center;
            line-height: 1;
            position: relative;
            min-width: 75px;
            height: 23px;
            cursor: default;
            user-select: none;
            font-family: inherit;
            font-size: 11px;
            outline: none;
        }

        button::after,
        .win-btn::after {
            content: "";
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 3px;
        }

        button:disabled,
        button.disabled,
        .win-btn:disabled,
        .win-btn.disabled {
            background: #F5F4EA;
            color: #A1A192;
            border: 1px solid #C9C7BA;
            box-shadow: none;
            text-shadow: 1px 1px 0 #FFFFFF;
        }

        button:focus::after,
        .win-btn:focus::after {
            display: block;
            border: 2px solid rgba(111, 152, 207, 0.698);
        }

        button:not(:disabled):hover::after,
        .win-btn:not(:disabled):hover::after {
            display: block;
            border: 2px solid rgba(245, 192, 93, 0.698);
        }

        button:not(:disabled):active,
        .win-btn:not(:disabled):active {
            background: #E2E1D9;
            box-shadow: inset 1px 2px 1px #D1CCC1, inset 0 -1px 1px #fff;
            padding: 3px 15px 2px 17px; /* Shift text 1px down and right */
        }

        button:not(:disabled):active::after,
        .win-btn:not(:disabled):active::after {
            display: none;
        }

        .win-btn.default {
            /* font-weight: bold; */ /* Removed as per user request */
        }

        /* Select styling */
        select {
            height: 21px;
            font-size: 11px;
            border: 1px solid #7F9DB9;
            padding: 1px;
        }
    </style>
</head>
<body>
    <div class="timedateprops">
        <div class="content-container">
                <div style="display: flex; flex-direction: row; gap: 15px;">
                    <!-- Date Section -->
                    <div style="width: 55%;">
                        <p class="section-title">Date</p>
                        <div class="controls-group">
                            <div style="display: flex; margin-bottom: 8px; gap: 5px;">
                                <select id="month-select" style="flex-grow: 1;">
                                    <option value="0">January</option>
                                    <option value="1">February</option>
                                    <option value="2">March</option>
                                    <option value="3">April</option>
                                    <option value="4">May</option>
                                    <option value="5">June</option>
                                    <option value="6">July</option>
                                    <option value="7">August</option>
                                    <option value="8">September</option>
                                    <option value="9">October</option>
                                    <option value="10">November</option>
                                    <option value="11">December</option>
                                </select>
                                <div style="display: flex; align-items: center;">
                                    <input type="text" id="year-input" readonly style="width: 45px; text-align: center; height: 17px; font-size: 11px; border: 1px solid #7F9DB9;">
                                    <div class="spinner-buttons">
                                        <button id="year-up" class="spinner-btn">▲</button>
                                        <button id="year-down" class="spinner-btn">▼</button>
                                    </div>
                                </div>
                            </div>
                            <table id="calendar-table" class="calendar">
                                <thead>
                                    <tr><th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th></tr>
                                </thead>
                                <tbody id="calendar-body">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Time Section -->
                    <div style="width: 45%;">
                        <p class="section-title">Time</p>
                        <div class="controls-group" style="text-align: center; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                            <svg id="analog-clock" width="100" height="100" viewBox="-60 -60 120 120">
                                <circle cx="0" cy="0" r="55" stroke="#7F9DB9" stroke-width="2" fill="white"></circle>
                                <!-- Hour markers -->
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(0)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(30)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(60)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(90)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(120)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(150)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(180)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(210)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(240)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(270)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(300)"></line>
                                <line x1="0" y1="-48" x2="0" y2="-53" stroke="#333" stroke-width="2" transform="rotate(330)"></line>
                                
                                <!-- Hands -->
                                <line id="hour-hand" x1="0" y1="0" x2="0" y2="-30" stroke="black" stroke-width="4" stroke-linecap="round"></line>
                                <line id="minute-hand" x1="0" y1="0" x2="0" y2="-45" stroke="black" stroke-width="2" stroke-linecap="round"></line>
                                <line id="second-hand" x1="0" y1="0" x2="0" y2="-50" stroke="red" stroke-width="1" stroke-linecap="round"></line>
                                <circle cx="0" cy="0" r="2" fill="black"></circle>
                            </svg>
                            <div class="digital-time-container">
                                <input type="text" id="digital-time-input" readonly>
                                <div class="spinner-buttons">
                                    <button id="time-up" class="spinner-btn">▲</button>
                                    <button id="time-down" class="spinner-btn">▼</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <p id="timezone-info" style="margin-top: 10px; margin-bottom:0; text-align:center; font-size:11px;">Current time zone: Korea Standard Time</p>
        </div>

        <div class="btn-container">
            <button class="win-btn default" onclick="window.top.postMessage({type: 'CLOSE_WINDOW'}, '*')">OK</button>
            <button class="win-btn" onclick="window.top.postMessage({type: 'CLOSE_WINDOW'}, '*')">Cancel</button>
            <button class="win-btn" disabled>Apply(<u>A</u>)</button>
        </div>
    </div>

    <script>
        const monthSelect = document.getElementById('month-select');
        const yearInput = document.getElementById('year-input');
        const yearUp = document.getElementById('year-up');
        const yearDown = document.getElementById('year-down');
        const calendarBody = document.getElementById('calendar-body');
        const digitalTimeInput = document.getElementById('digital-time-input');
        
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const secondHand = document.getElementById('second-hand');

        const timeUp = document.getElementById('time-up');
        const timeDown = document.getElementById('time-down');

        let currentDate = new Date();
        let isEditingTime = false;
        let lastUpdateTime = Date.now();

        function updateClock() {
            if (isEditingTime) return;
            
            const now = new Date();
            renderTime(now);
        }

        function renderTime(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            const seconds = date.getSeconds();

            // Analog hands
            const hourDeg = (hours % 12) * 30 + (minutes / 60) * 30;
            const minuteDeg = minutes * 6;
            const secondDeg = seconds * 6;

            hourHand.setAttribute('transform', `rotate(${hourDeg} 0 0)`);
            minuteHand.setAttribute('transform', `rotate(${minuteDeg} 0 0)`);
            secondHand.setAttribute('transform', `rotate(${secondDeg} 0 0)`);

            // Digital input
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            const hStr = String(displayHours).padStart(2, '0');
            const mStr = String(minutes).padStart(2, '0');
            const sStr = String(seconds).padStart(2, '0');
            digitalTimeInput.value = `${hStr}:${mStr}:${sStr} ${ampm}`;
            
            currentDate = new Date(date);
        }

        function adjustTime(delta) {
            isEditingTime = true;
            // Simplified: adjust seconds by delta
            currentDate.setSeconds(currentDate.getSeconds() + delta);
            renderTime(currentDate);
            
            // Resume ticking after 5 seconds of inactivity
            clearTimeout(window.resumeTimeout);
            window.resumeTimeout = setTimeout(() => {
                isEditingTime = false;
            }, 5000);
        }

        // Initialize values
        monthSelect.value = currentDate.getMonth();
        yearInput.value = currentDate.getFullYear();

        timeUp.addEventListener('click', () => adjustTime(1));
        timeDown.addEventListener('click', () => adjustTime(-1));

        function renderCalendar() {
            const year = parseInt(yearInput.value);
            const month = parseInt(monthSelect.value);
            
            calendarBody.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            let date = 1;
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('tr');
                
                for (let j = 0; j < 7; j++) {
                    const cell = document.createElement('td');
                    if (i === 0 && j < firstDay) {
                        cell.classList.add('other-month');
                        row.appendChild(cell);
                    } else if (date > daysInMonth) {
                        cell.classList.add('other-month');
                        row.appendChild(cell);
                    } else {
                        cell.textContent = date;
                        if (date === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                            cell.classList.add('selected');
                        }
                        row.appendChild(cell);
                        date++;
                    }
                }
                calendarBody.appendChild(row);
                if (date > daysInMonth) break;
            }
        }

        // Initialize values
        monthSelect.value = currentDate.getMonth();
        yearInput.value = currentDate.getFullYear();

        // Listeners
        monthSelect.addEventListener('change', renderCalendar);
        yearUp.addEventListener('click', () => { yearInput.value = parseInt(yearInput.value) + 1; renderCalendar(); });
        yearDown.addEventListener('click', () => { yearInput.value = parseInt(yearInput.value) - 1; renderCalendar(); });

        // Start clock
        setInterval(updateClock, 1000);
        updateClock();
        renderCalendar();
    </script>
</body>
</html>
